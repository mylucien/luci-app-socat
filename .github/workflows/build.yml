name: Build luci-app-socat

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt 版本'
        required: false
        default: '23.05.3'

env:
  OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || '23.05.3' }}
  PACKAGE_NAME: luci-app-socat

jobs:
  # ── 代码检查 ────────────────────────────────────────────────────────
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 检查必要文件
        run: |
          for f in \
            Makefile \
            luasrc/controller/socat.lua \
            luasrc/model/cbi/socat/socat.lua \
            luasrc/model/cbi/socat/socat_edit.lua \
            root/etc/init.d/socat-luci \
            root/usr/share/rpcd/acl.d/luci-app-socat.json; do
            [ -f "$f" ] && echo "✅ $f" || { echo "❌ 缺少: $f"; exit 1; }
          done

      - name: 检查 init.d 语法
        run: bash -n root/etc/init.d/socat-luci && echo "✅ OK"

      - name: 检查 Makefile
        run: |
          grep -q "PKG_NAME:=luci-app-socat" Makefile
          grep -q "BuildPackage" Makefile
          echo "✅ Makefile OK"

  # ── 编译 ────────────────────────────────────────────────────────────
  build:
    name: 编译 (${{ matrix.arch }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86/64
            sdk_pattern: openwrt-sdk-${{ github.event.inputs.openwrt_version || '23.05.3' }}-x86-64_gcc
          - arch: aarch64_generic
            target: armsr/armv8
            sdk_pattern: openwrt-sdk-${{ github.event.inputs.openwrt_version || '23.05.3' }}-armsr-armv8_gcc
          - arch: arm_cortex-a9
            target: mvebu/cortexa9
            sdk_pattern: openwrt-sdk-${{ github.event.inputs.openwrt_version || '23.05.3' }}-mvebu-cortexa9_gcc

    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential gawk gettext git \
            libncurses-dev libssl-dev \
            python3-setuptools rsync \
            unzip zlib1g-dev wget curl

      - name: 缓存 SDK
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: sdk-${{ matrix.arch }}
          key: openwrt-sdk-${{ env.OPENWRT_VERSION }}-${{ matrix.arch }}-v2

      - name: 下载 SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          BASE="https://downloads.openwrt.org/releases/${{ env.OPENWRT_VERSION }}/targets/${{ matrix.target }}"
          PATTERN="${{ matrix.sdk_pattern }}"

          echo "正在获取 SDK 列表: ${BASE}/"
          SDK_FILE=$(curl -fsSL "${BASE}/" \
            | grep -o "${PATTERN}[^\"'<>]*\.tar\.xz" \
            | head -1)

          if [ -z "$SDK_FILE" ]; then
            echo "❌ 未找到 SDK，目录内容："
            curl -fsSL "${BASE}/" | grep -o 'href="[^"]*"' | head -20
            exit 1
          fi

          echo "下载: ${BASE}/${SDK_FILE}"
          wget -q --show-progress "${BASE}/${SDK_FILE}" -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv ${PATTERN}* sdk-${{ matrix.arch }}
          rm sdk.tar.xz

      - name: 更新 feeds
        run: |
          cd sdk-${{ matrix.arch }}
          [ -f feeds.conf.default ] && ./scripts/feeds update -a 2>&1 | tail -3 || true
          [ -f feeds.conf.default ] && ./scripts/feeds install -a 2>&1 | tail -3 || true

      - name: 放入插件
        run: |
          PKGDIR="sdk-${{ matrix.arch }}/package/${{ env.PACKAGE_NAME }}"
          mkdir -p "$PKGDIR"
          rsync -a --exclude='.git' --exclude='sdk-*' --exclude='artifacts' . "$PKGDIR/"

      - name: 编译
        run: |
          cd sdk-${{ matrix.arch }}
          echo "CONFIG_PACKAGE_${{ env.PACKAGE_NAME }}=m" >> .config
          make defconfig 2>/dev/null

          echo "=== 开始编译 ==="
          if ! make package/${{ env.PACKAGE_NAME }}/compile V=s 2>&1 | tee /tmp/build.log | \
               grep -E "^(make\[1\]|ERROR|error:|Makefile:)" | head -30; then
            true
          fi

          IPK=$(find bin/ -name "${{ env.PACKAGE_NAME }}*.ipk" 2>/dev/null | head -1)
          if [ -z "$IPK" ]; then
            echo "❌ 编译失败，末尾日志："
            tail -40 /tmp/build.log
            exit 1
          fi
          echo "✅ 编译成功: $IPK"

      - name: 收集产物
        run: |
          mkdir -p artifacts/${{ matrix.arch }}
          find sdk-${{ matrix.arch }}/bin -name "${{ env.PACKAGE_NAME }}*.ipk" \
            -exec cp {} artifacts/${{ matrix.arch }}/ \;
          ls -lh artifacts/${{ matrix.arch }}/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.arch }}
          path: artifacts/${{ matrix.arch }}/*.ipk
          retention-days: 30

  # ── 发布 Release ─────────────────────────────────────────────────────
  # tag 推送：正式发布（使用 tag 名称，如 v1.0.0）
  # main/master push：自动更新 latest 预发布版本
  release:
    name: 发布 Release
    needs: build
    runs-on: ubuntu-latest
    # PR 不发布；push 到主分支或推 tag 都发布
    if: github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: 整理发布文件
        run: |
          mkdir -p release-files
          find all-artifacts -name "*.ipk" -exec cp {} release-files/ \;
          echo "=== 发布文件 ==="
          ls -lh release-files/

      - name: 确定发布信息
        id: release-info
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # tag 推送：正式版本
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "release_name=luci-app-socat ${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            # 普通 push：更新 latest 预发布
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag_name=latest" >> $GITHUB_OUTPUT
            echo "release_name=luci-app-socat latest (${SHORT_SHA})" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: 生成 Release 说明
        run: |
          IS_TAG="${{ steps.release-info.outputs.is_tag }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          if [ "$IS_TAG" = "true" ]; then
            VERSION_LINE="版本：**${{ steps.release-info.outputs.tag_name }}**"
          else
            VERSION_LINE="构建：\`${SHORT_SHA}\`（开发版，随主分支持续更新）"
          fi

          cat > release_notes.md << NOTES
          ## luci-app-socat

          ${VERSION_LINE}

          ### 安装方法

          1. 根据路由器架构下载对应的 \`.ipk\` 文件
          2. 在路由器上执行：
          \`\`\`bash
          opkg install luci-app-socat_*.ipk
          \`\`\`
          3. 刷新浏览器，进入 LuCI **「服务」→「Socat 端口转发」**

          > 如果菜单未出现，执行 \`/etc/init.d/rpcd restart\` 后再刷新。

          ### 架构对照

          | 文件 | 架构 | 适用 |
          |------|------|------|
          | \`*x86-64*\` | x86_64 | 软路由 / x86 虚拟机 |
          | \`*armsr-armv8*\` | aarch64_generic | 树莓派 4、ARM64 设备 |
          | \`*mvebu-cortexa9*\` | arm_cortex-a9 | Marvell 系列 |

          ### 功能特性

          - TCP / UDP / Unix Socket / TLS 多协议转发
          - UDP 组播接收与跨网段中继
          - firewall4（nftables）/ firewall3（iptables）自动检测
          - 拖拽排序、实时连接数、日志查看面板
          - procd 管理，崩溃自动重启
          NOTES

      - name: 删除旧的 latest Release（仅非 tag 时）
        if: steps.release-info.outputs.is_tag == 'false'
        run: |
          # 删除已有的 latest tag 和 release，忽略不存在的错误
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-info.outputs.tag_name }}
          name: ${{ steps.release-info.outputs.release_name }}
          body_path: release_notes.md
          files: release-files/*.ipk
          draft: false
          prerelease: ${{ steps.release-info.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
